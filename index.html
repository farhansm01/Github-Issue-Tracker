<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      src="https://kit.fontawesome.com/d8e34e8eec.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- login form -->
    <section
      id="loginSection"
      class="flex justify-center items-center min-h-screen"
    >
      <div
        class="w-full max-w-[520px] text-center bg-white p-8 rounded-lg shadow-lg space-y-6"
      >
        <div>
          <img class="mx-auto mb-6" src="./assets/github-logo.png" alt="" />
          <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div class="flex flex-col text-left">
          <label class="font-semibold mb-2" for="username">Username</label>
          <input
            id="username"
            class="p-3 rounded-lg border-2 border-gray-200 mb-4"
            type="text"
            placeholder="Enter Username"
          />

          <label class="font-semibold mb-2" for="password">Password</label>
          <input
            id="password"
            class="p-3 rounded-lg border-2 border-gray-200 mb-4"
            type="password"
            placeholder="Enter Password"
          />

          <button onclick="manageLogin()" type="button" class="btn btn-primary">
            Sign In
          </button>
        </div>
        <p>---------------------OR-----------------------</p>
        <div>
          <p class="text-[#64748B] mb-2">Demo Credentials</p>
          <div class="bg-[#F8FAFC] p-4 rounded-lg">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
          </div>
        </div>
      </div>
    </section>

    <!-- navbar -->
    <header id="header" class="bg-white shadow hidden">
      <nav
        class="max-w-11/12 mx-auto flex flex-col md:flex-row gap-7 justify-between items-center p-3"
      >
        <div class="flex items-center gap-1">
          <img
            src="./assets/github-logo.png"
            alt="GitHub Logo"
            class="w-10 h-10"
          />
          <h1 class="text-2xl font-bold">Github Issues Tracker</h1>
        </div>
        <div class="flex gap-2 items-center p-2">
          <!-- Search Input -->
          <div class="relative">
            <i
              class="fa-solid fa-magnifying-glass absolute z-40 left-3 top-1/2 -translate-y-1/2 text-gray-400"
            ></i>
            <!--     -->
            <input
              id="input-btn"
              type="text"
              placeholder="Search issues..."
              class="input pl-10 w-64"
            />
          </div>

          <!-- Button -->
          <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
      </nav>
    </header>

    <main id="main" class="hidden">
      <!-- Tab section -->
      <div
        class="max-w-[1600px] mx-auto bg-white mt-15 mb-4 p-6 rounded-lg shadow"
      >
        <button
          onclick="loadAllIssues()"
          id="allTab"
          class="btn w-18 sm:w-23 border-gray-400 text-gray-500 bg-transparent hover:bg-[#4A00FF] hover:text-white tab active"
        >
          All
        </button>
        <button
          onclick="loadOpenIssues()"
          id="openTab"
          class="btn w-18 sm:w-23 border-gray-400 text-gray-500 bg-transparent hover:bg-[#4A00FF] hover:text-white tab"
        >
          Open
        </button>
        <button
          onclick="loadClosedIssues()"
          id="closedTab"
          class="btn w-18 sm:w-23 border-gray-400 text-gray-500 bg-transparent hover:bg-[#4A00FF] hover:text-white tab"
        >
          Closed
        </button>
      </div>

      <!-- Issue List -->
      <div class="max-w-[1600px] mx-auto rounded-lg shadow rounded-t-xl">
        <!-- header of card container -->
        <div
          class="bg-white border-b-2 p-6 border-gray-200 flex items-center justify-between rounded-t-xl"
        >
          <div class="flex items-center gap-2">
            <img src="./assets/Aperture.png" alt="" />
            <div>
              <h3 id="totalIssues" class="text-xl font-semibold">50 Issues</h3>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex flex-col sm:flex-row items-center gap-6">
            <div class="flex items-center gap-2">
              <span class="w-4 h-4 bg-green-600 rounded-full"></span>
              <span>Open</span>
            </div>

            <div class="flex items-center gap-2">
              <span class="w-4 h-4 bg-purple-500 rounded-full"></span>
              <span>Closed</span>
            </div>
          </div>
        </div>
        <!-- Loading Spinner -->
        <div id="spinner" class="flex items-center justify-center py-20 hidden">
          <span class="loading loading-infinity loading-xl"></span>
        </div>
        <!-- Card Container -->
        <div
          id="issues-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 p-6"
        ></div>
      </div>
    </main>

    <!-- Modal  -->
    <!-- Open the modal using ID.showModal() method -->

    <dialog id="my_modal_1" class="modal">
      <div class="modal-box">
        <div id="modalDetails" class=""></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./index.js"></script>
  </body>
</html>
